<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="tracker.css">
</head>
<body>
    <div class="page-header">
        <a class="login-button" href="welcome.html">Back</a>
    </div>

    <main class="welcome-page">
        <section class="welcome-card">
            <h1>Log In / Sign Up</h1>
            <p class="welcome-text">Choose an option below to continue.</p>

            <div class="auth-forms">
                <form class="auth-form" id="loginForm">
                    <h2>Log In</h2>
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com">

                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">

                    <button type="submit">Log In</button>
                </form>

                <form class="auth-form" id="signupForm">
                    <h2>Sign Up</h2>
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com">

                    <label for="signupFirstName">First Name</label>
                    <input type="text" id="signupFirstName" placeholder="Taylor">

                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a password">

                    <label for="signupConfirmPassword">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" placeholder="Re-enter your password">

                    <button type="submit">Sign Up</button>
                </form>
            </div>

            <p id="loginMessage" class="login-message" aria-live="polite"></p>
        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
