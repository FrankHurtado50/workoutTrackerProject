<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="tracker.css">
</head>
<body>
    <div class="page-header">
        <a class="login-button" href="welcome.html">Back</a>
    </div>

    <main class="welcome-page">
        <section class="welcome-card">
            <h1>Log In</h1>
            <p class="welcome-text">Enter your account details to continue.</p>

            <form class="auth-form" id="loginForm">
                <label for="username">Email or username</label>
                <input type="text" id="username" placeholder="you@example.com">

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">

                <button type="submit">Sign In</button>
                <p id="loginMessage" class="login-message" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
