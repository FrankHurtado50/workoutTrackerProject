<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Workout Tracker</title>
    <link rel="stylesheet" href="tracker.css">
</head>
<body>
    <div class="page-header">
        <a class="login-button" href="login.html">Log In</a>
    </div>
    <main class="welcome-page">
        <section class="welcome-card">
            <h1>Welcome!</h1>
            <p class="welcome-text">What would you like to do today?</p>

            <div class="choice-grid">
                <a class="choice-card" href="tracker.html?mode=new">
                    <h2>Add a new workout</h2>
                    <p>Start fresh and log a brand new exercise session.</p>
                </a>

                <a class="choice-card" href="previous-workouts.html">
                    <h2>Add more from a previous workout</h2>
                    <p>Pick an earlier workout and build on it with a new entry.</p>
                </a>
            </div>
        </section>
    </main>
</body>
</html>
